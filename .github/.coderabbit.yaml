# https://docs.coderabbit.ai/guides/configure-coderabbit
language: en
reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  # Skip machine-translated docs (locale-suffixed like index.pt-BR.md).
  path_filters:
    - "!docs/**/*.*.md"
  auto_review:
    enabled: true
    drafts: false
chat:
  auto_reply: true
