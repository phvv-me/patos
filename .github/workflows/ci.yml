name: CI

on:
  pull_request:
  workflow_call: # publish.yml runs this exact gate on main before publishing
  workflow_dispatch: # manual runs (e.g. to validate main directly between releases)

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # The source now uses PEP 758's unparenthesized multi-exception `except` (see
        # `flyweight.py`), which needs 3.14, matching `requires-python`; testing older
        # interpreters here would fail before a single check ran.
        python: ["3.14"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python }}
          enable-cache: true
      - run: uv sync --extra dev --extra sql
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy src
      - run: uv run pyrefly check
      - run: uv run pytest --cov=patos
