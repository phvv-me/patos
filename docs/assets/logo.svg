<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" role="img" aria-label="patos">
  <title>patos</title>
  <defs>
    <linearGradient id="pond" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#14b8a6"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="duck" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fcd34d"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <!-- pond disc -->
  <circle cx="50" cy="50" r="46" fill="url(#pond)"/>
  <!-- water surface -->
  <path d="M4 64 Q50 74 96 64 L96 96 Q50 96 4 96 Z" fill="#0b5650" opacity="0.55"/>
  <!-- duck body -->
  <path d="M27 66
           q-8 -2 -8 -12
           q0 -14 17 -16
           q4 -14 19 -14
           q17 0 18 17
           q9 1 9 11
           q0 14 -19 14 Z"
        fill="url(#duck)"/>
  <!-- head -->
  <circle cx="64" cy="37" r="13.5" fill="#fcd34d"/>
  <!-- wing -->
  <path d="M37 56 q13 -9 26 -3 q-7 10 -22 8 q-3 -2 -4 -5 Z" fill="#f59e0b"/>
  <!-- eye -->
  <circle cx="68.5" cy="34" r="2.7" fill="#1c1917"/>
  <!-- bill -->
  <path d="M77 37 q13 -1 13 5 q0 6 -13 5 q-3 -5 0 -10 Z" fill="#fb923c"/>
</svg>
